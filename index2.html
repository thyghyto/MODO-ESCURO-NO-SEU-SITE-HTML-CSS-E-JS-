<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <style>
        body {
            transition: 0.3s;
        }

        /* modo escuro */
        .dark {
            background-color: black;
            color: white;
        }

        /* botão */
        button {
            position: fixed;
            top: 20px;
            left: 20px;

            width: 60px;
            height: 60px;

            font-size: 22px;

            border-radius: 50%;
            border: none;
            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;

            background-color: rgb(248, 241, 210);
            color: rgb(71, 33, 2);

            box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.15) rotate(10deg);
            background-color: rgb(243, 186, 80);
            color: white;
        }

        /* botão no modo escuro */
        .dark button {
            background-color: rgb(30, 30, 30);
            color: white;
        }
    </style>

</head>

<body>

    <h1>Modo Escuro Tutorial</h1>

    <button onclick="modo_escuro()">🌙</button>

    <script>
        function modo_escuro(){
            document.body.classList.toggle("dark");
        }
    </script>

</body>

</html>
