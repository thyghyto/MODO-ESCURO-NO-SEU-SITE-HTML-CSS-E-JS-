<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <style>

        .dark{
            background-color: black;
            color: white;
        }

    </style>

</head>

<body>

    <button onclick="modo_escuro()">
        🌙
    </button>

    <script>

        function modo_escuro(){

            document.body.classList.toggle("dark");

        }

    </script>

</body>

</html>
